<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="flow" x1="120" y1="200" x2="400" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <!-- 圆角方形背景 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- 画布边框 (内嵌圆角矩形) -->
  <rect x="80" y="80" width="352" height="352" rx="40" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="12"/>
  <!-- 流动笔触 — 代表 AI 创作的流畅感 -->
  <path d="M160 310 C190 220, 240 180, 280 200 S350 280, 360 220" stroke="url(#flow)" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- 画笔尖点 -->
  <circle cx="360" cy="220" r="14" fill="#fff" opacity="0.9"/>
  <!-- 星形闪烁 — 代表 AI -->
  <g transform="translate(170,140)" fill="#fff" opacity="0.85">
    <path d="M0,-20 L5,-6 20,-6 8,4 13,20 0,11 -13,20 -8,4 -20,-6 -5,-6Z"/>
  </g>
  <g transform="translate(340,330) scale(0.6)" fill="#fff" opacity="0.6">
    <path d="M0,-20 L5,-6 20,-6 8,4 13,20 0,11 -13,20 -8,4 -20,-6 -5,-6Z"/>
  </g>
</svg>
